# In /etc/pf.conf hinzufügen:

# PyBitmessage Outbound-Regeln
pass out quick inet proto tcp from any to any port 8444
pass out quick inet proto tcp from any to any port 8080

# Falls du Incoming Connections erlauben willst (für bessere Connectivity):
pass in quick inet proto tcp from any to (self) port 8444

# Oder spezifischer für deine IP:
pass in quick inet proto tcp from any to 192.168.8.161 port 8444
